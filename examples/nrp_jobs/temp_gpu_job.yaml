name_prefix: analysis-temp-gpu
namespace: default
labels:
  analysis: spikelab
  workflow: temp
container:
  command: ["python", "/opt/spikelab/run_analysis.py"]
  args: []
  env:
    OUTPUT_PREFIX: s3://braingeneers/ephys-analysis/
resources:
  requests_cpu: "4"
  requests_memory: "16Gi"
  limits_cpu: "4"
  limits_memory: "16Gi"
  requests_gpu: 1
  limits_gpu: 1
  node_selector: {}
volumes: []
