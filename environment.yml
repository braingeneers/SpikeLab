name: integrated-analysis-tools
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - numpy>=1.20
  - scipy>=1.5
  - scikit-learn
  - networkx
  - matplotlib>=3.5
  - pandas>=1.3
  - h5py>=3.0.0
  # Install umap from conda so numba/llvmlite are binaries; pip+umap often
  # builds llvmlite from source and fails (setuptools spawn/dry_run).
  - umap-learn>=0.5.0
  - pip
  - pip:
    - mcp>=0.9.0
    - boto3>=1.28.0
    - pytest>=7.0
    - pytest-asyncio>=0.21.0
    - black>=24.0
    - sphinx>=7.0
    - sphinx-rtd-theme>=2.0
    - sphinx-autodoc-typehints>=1.25
    # Optional — guarded in source with try/except ImportError
    - neo>=0.12.0
    - quantities>=0.14.0

