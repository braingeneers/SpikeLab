name: integrated-analysis-tools
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - numpy>=1.20
  - scipy>=1.5
  - scikit-learn
  - networkx
  - matplotlib>=3.5
  - pip
  - pip:
    - mcp>=0.9.0
    - boto3>=1.28.0
    - pytest>=7.0
    - pytest-asyncio>=0.21.0
    - black>=24.0
    - sphinx>=7.0
    - sphinx-rtd-theme>=2.0
    - sphinx-autodoc-typehints>=1.25
    - h5py>=3.0.0
    # Optional extras — guarded in source with try/except ImportError
    - umap-learn>=0.5.0
    - neo>=0.12.0
    - quantities>=0.14.0

