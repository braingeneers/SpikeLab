name: nrp
namespace: default
labels:
  app.kubernetes.io/managed-by: spikelab-nrp-jobs
  app.kubernetes.io/part-of: nrp-analysis
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 50
        preference:
          matchExpressions:
            - key: nvidia.com/gpu.present
              operator: In
              values: ["true"]
tolerations: []
default_secrets_mapping:
  s3_credentials_secret: prp-s3-credentials
default_images:
  cpu: ghcr.io/braingeneers/spikelab-analysis-base:cpu
  gpu: ghcr.io/braingeneers/spikelab-analysis-base:gpu
resources:
  requests_cpu: "2"
  requests_memory: "8Gi"
  limits_cpu: "2"
  limits_memory: "8Gi"
  requests_gpu: 1
  limits_gpu: 1
  node_selector: {}
