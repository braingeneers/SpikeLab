[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "integrated-analysis-tools"
version = "0.0.0"
description = "Analysis tools for automated closed-loop experimentation and analysis"
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "SpikeLab Maintainers" }
]
dependencies = [
  "numpy>=1.20",
  "scipy>=1.5",
  "mcp>=0.9.0",
  "h5py>=3.0.0",
]

[tool.setuptools.packages.find]
include = ["spikedata*", "data_loaders*", "mcp_server*", "workspace*"]

[project.optional-dependencies]
dev = [
  "pytest>=7.0",
  "pytest-asyncio>=0.21.0",
  "black>=24.0",
]
docs = [
  "sphinx>=7.0",
  "sphinx-rtd-theme>=2.0",
  "sphinx-autodoc-typehints>=1.25",
]
s3 = [
  "boto3>=1.28.0",
]
gplvm = [
  "poor-man-gplvm>=0.1.0",
  "jax>=0.4.26",
  "jaxlib>=0.4.26",
  "jaxopt>=0.8.2",
  "optax>=0.2.2",
]
all = [
  "boto3>=1.28.0",
  "poor-man-gplvm>=0.1.0",
  "jax>=0.4.26",
  "jaxlib>=0.4.26",
  "jaxopt>=0.8.2",
  "optax>=0.2.2",
]

[tool.black]
line-length = 88
target-version = ["py310"]
exclude = '(\.git|\.venv|build|dist)'

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = [".."]
filterwarnings = [
    "ignore::DeprecationWarning:quantities",
    "ignore:numpy.core is deprecated:DeprecationWarning",
    "ignore:__array_wrap__ must accept context:DeprecationWarning",
]


